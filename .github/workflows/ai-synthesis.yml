name: Daily AI synthesis + email

on:
  schedule:
    # 07:00 UTC = 09:00 Brussel zomertijd (CEST)
    # Fetch + synthesis + email in één run zodat de mail om ~09:05-09:10 arriveert.
    - cron: "0 7 * * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

concurrency:
  group: culture-synthesis
  cancel-in-progress: false

jobs:
  synthesize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Fetch RSS feeds
        run: npm run update

      - name: Run AI synthesis
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npm run synthesize

      - name: Commit AI-enhanced data
        run: |
          git config user.name  "culture-tracker-bot"
          git config user.email "actions@users.noreply.github.com"
          git pull --rebase --autostash || true
          git add data/latest.json data/archive/
          if git diff --cached --quiet; then
            echo "Geen wijzigingen."
          else
            git commit -m "chore(data): AI synthesis $(date -u +'%Y-%m-%d %H:%M UTC') [skip ci]"
            git push
          fi

      - name: Send daily email digest
        # Gaat door ook als SMTP-secrets ontbreken — workflow faalt dan niet.
        continue-on-error: true
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO:   ${{ secrets.EMAIL_TO }}
          PUBLIC_URL: ${{ secrets.PUBLIC_URL }}
        run: npm run email
