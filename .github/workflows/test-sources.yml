name: Test proposed sources

on:
  # Run automatically when sources.json changes (e.g. after a PR or direct push)
  push:
    paths:
      - "config/sources.json"
  # Also available on demand
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - run: npm ci

      - name: Run source tests
        run: node scripts/test-proposed-sources.js

      - name: Commit results
        run: |
          git config user.name  "culture-tracker-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/source-test-results.json
          git diff --cached --quiet || git commit -m "chore: source test results [skip ci]" && git push
