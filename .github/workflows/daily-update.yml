name: Hourly culture update

on:
  schedule:
    # Top of every hour, UTC. Adjust to taste:
    #   "0 */3 * * *"  every 3 hours
    #   "0 */6 * * *"  every 6 hours
    #   "0 6 * * *"    once a day at 06:00 UTC (= 08:00 Brussels in summer)
    - cron: "0 * * * *"
  workflow_dispatch:
    inputs:
      send_email:
        description: "Also send the email after this run? (Default: no — email is handled by 'Daily email digest'.)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

# Avoid two scheduled runs stepping on each other if a previous run is slow.
concurrency:
  group: culture-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run fetch & group
        # No API keys — this just pulls RSS and groups by category.
        # Optional overrides:
        #   LOOKBACK_HOURS: "24"
        #   MAX_ITEMS_PER_FEED: "10"
        run: npm run update

      - name: Commit updated data
        # Use [skip ci] so we never trigger downstream workflows just from data commits.
        run: |
          git config user.name  "culture-tracker-bot"
          git config user.email "actions@users.noreply.github.com"
          git pull --rebase --autostash || true
          git add data/latest.json data/archive/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore(data): culture update $(date -u +'%Y-%m-%d %H:%M UTC') [skip ci]"
            git push
          fi

      # Email is OPT-IN here. Scheduled hourly runs NEVER email.
      # The 'Daily email digest' workflow handles the once-per-day mail.
      - name: Send email (manual opt-in only)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.send_email == 'true' }}
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          PUBLIC_URL: ${{ secrets.PUBLIC_URL }}
        run: npm run email
