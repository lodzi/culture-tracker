<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Culture Tracker</title>
  <meta name="description" content="Dagelijkse signalen uit de populaire cultuur." />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1 class="logo">Zeitfeed weekly</h1>
      <p class="tagline" id="brief-date">Wekelijkse signalen uit de populaire cultuur</p>

      <!-- Tab switcher: Daily / Weekly / Monthly -->
      <nav class="layers" aria-label="Tijdsframe">
        <button id="tab-daily"   class="layer-btn active" type="button">Daily</button>
        <button id="tab-weekly"  class="layer-btn hidden" type="button">Weekly</button>
        <button id="tab-monthly" class="layer-btn hidden" type="button">Monthly</button>
      </nav>
    </div>
  </header>

  <main class="container">
    <!-- Intro block -->
    <section id="intro" class="intro" aria-live="polite">
      <p class="loading">Brief laden…</p>
    </section>

    <!-- Category filter -->
    <section class="filters" id="filters" aria-label="Filters">
      <div class="filter-row">
        <label>
          <span>Categorie</span>
          <select id="filter-category">
            <option value="">Alle categorieën</option>
          </select>
        </label>
        <button id="filter-reset" type="button" class="reset">Reset</button>
      </div>
    </section>

    <!-- Daily layer -->
    <section id="layer-daily" class="layer" aria-label="Daily trends"></section>

    <!-- Weekly layer (hidden until data is available) -->
    <section id="layer-weekly" class="layer hidden" aria-label="Weekly trends"></section>

    <!-- Monthly layer (hidden until data is available) -->
    <section id="layer-monthly" class="layer hidden" aria-label="Monthly trends"></section>

    <!-- Archive -->
    <section class="archive" aria-label="Archief">
      <h2>Archief</h2>
      <ul id="archive-list" class="archive-list">
        <li class="loading">Archief laden…</li>
      </ul>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>Culture Tracker &middot; powered by Claude Haiku &amp; Sonnet &middot; <a href="./data/latest.json">latest.json</a></p>
    </div>
  </footer>

  <script src="./app.js"></script>
</body>
</html>
